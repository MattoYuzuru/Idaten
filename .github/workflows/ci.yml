name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: idaten
          POSTGRES_USER: idaten
          POSTGRES_PASSWORD: idaten
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U idaten -d idaten"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://idaten:idaten@localhost:5432/idaten
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e '.[dev]'
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy app
      - run: pytest -q
      - run: alembic upgrade head
      - run: alembic check

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build backend
