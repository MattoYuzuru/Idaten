services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idaten}
      POSTGRES_USER: ${POSTGRES_USER:-idaten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://idaten:change-me@postgres:5432/idaten}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_PATH: ${STORAGE_PATH:-/data/idaten}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_ARCHIVE_UNCOMPRESSED_BYTES: ${MAX_ARCHIVE_UNCOMPRESSED_BYTES:-52428800}
      MAX_ARCHIVE_ENTRIES: ${MAX_ARCHIVE_ENTRIES:-10}
      MAX_ARCHIVE_RATIO: ${MAX_ARCHIVE_RATIO:-100}
      IMPORT_API_TOKEN: ${IMPORT_API_TOKEN:-}
      HEALTH_CONNECT_SECURITY_PEPPER: ${HEALTH_CONNECT_SECURITY_PEPPER:-}
      HEALTH_CONNECT_LINK_TTL_SECONDS: ${HEALTH_CONNECT_LINK_TTL_SECONDS:-600}
      HEALTH_CONNECT_LINK_ATTEMPT_LIMIT: ${HEALTH_CONNECT_LINK_ATTEMPT_LIMIT:-5}
      HEALTH_CONNECT_LINK_ATTEMPT_WINDOW_SECONDS: ${HEALTH_CONNECT_LINK_ATTEMPT_WINDOW_SECONDS:-900}
      HEALTH_CONNECT_MAX_BATCH_SIZE: ${HEALTH_CONNECT_MAX_BATCH_SIZE:-25}
      OUTBOX_POLL_SECONDS: ${OUTBOX_POLL_SECONDS:-5}
      LLM_PROVIDER: ${LLM_PROVIDER:-NONE}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENDPOINT: ${LLM_ENDPOINT:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_RETRIES: ${LLM_RETRIES:-1}
      BOT_OWNER_TELEGRAM_ID: ${BOT_OWNER_TELEGRAM_ID:-}
      ACTIVITY_EXTRACTION_ENABLED: ${ACTIVITY_EXTRACTION_ENABLED:-false}
      ACTIVITY_EXTRACTION_PROVIDER: ${ACTIVITY_EXTRACTION_PROVIDER:-NONE}
      ACTIVITY_EXTRACTION_MODEL: ${ACTIVITY_EXTRACTION_MODEL:-gpt-4.1-nano}
      ACTIVITY_EXTRACTION_ENDPOINT: ${ACTIVITY_EXTRACTION_ENDPOINT:-https://api.openai.com/v1/responses}
      ACTIVITY_EXTRACTION_API_KEY: ${ACTIVITY_EXTRACTION_API_KEY:-}
      ACTIVITY_EXTRACTION_TIMEOUT_SECONDS: ${ACTIVITY_EXTRACTION_TIMEOUT_SECONDS:-15}
      ACTIVITY_EXTRACTION_RETRIES: ${ACTIVITY_EXTRACTION_RETRIES:-1}
      ACTIVITY_EXTRACTION_MAX_TEXT_CHARS: ${ACTIVITY_EXTRACTION_MAX_TEXT_CHARS:-4000}
      ACTIVITY_EXTRACTION_MAX_IMAGE_BYTES: ${ACTIVITY_EXTRACTION_MAX_IMAGE_BYTES:-5242880}
      ACTIVITY_EXTRACTION_MAX_IMAGE_PIXELS: ${ACTIVITY_EXTRACTION_MAX_IMAGE_PIXELS:-20000000}
      ACTIVITY_EXTRACTION_DAILY_USER_LIMIT: ${ACTIVITY_EXTRACTION_DAILY_USER_LIMIT:-5}
      ACTIVITY_EXTRACTION_MONTHLY_GLOBAL_LIMIT: ${ACTIVITY_EXTRACTION_MONTHLY_GLOBAL_LIMIT:-100}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - activity_storage:/data/idaten
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  postgres_data:
  activity_storage:
