services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idaten}
      POSTGRES_USER: ${POSTGRES_USER:-idaten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://idaten:change-me@postgres:5432/idaten}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_PATH: ${STORAGE_PATH:-/data/idaten}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_ARCHIVE_UNCOMPRESSED_BYTES: ${MAX_ARCHIVE_UNCOMPRESSED_BYTES:-52428800}
      MAX_ARCHIVE_ENTRIES: ${MAX_ARCHIVE_ENTRIES:-10}
      MAX_ARCHIVE_RATIO: ${MAX_ARCHIVE_RATIO:-100}
      IMPORT_API_TOKEN: ${IMPORT_API_TOKEN:-}
      HEALTH_CONNECT_SECURITY_PEPPER: ${HEALTH_CONNECT_SECURITY_PEPPER:-}
      HEALTH_CONNECT_LINK_TTL_SECONDS: ${HEALTH_CONNECT_LINK_TTL_SECONDS:-600}
      HEALTH_CONNECT_LINK_ATTEMPT_LIMIT: ${HEALTH_CONNECT_LINK_ATTEMPT_LIMIT:-5}
      HEALTH_CONNECT_LINK_ATTEMPT_WINDOW_SECONDS: ${HEALTH_CONNECT_LINK_ATTEMPT_WINDOW_SECONDS:-900}
      HEALTH_CONNECT_MAX_BATCH_SIZE: ${HEALTH_CONNECT_MAX_BATCH_SIZE:-25}
      OUTBOX_POLL_SECONDS: ${OUTBOX_POLL_SECONDS:-5}
      BOT_OWNER_TELEGRAM_ID: ${BOT_OWNER_TELEGRAM_ID:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-OPENAI}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY:-}
      AI_OPENAI_ENDPOINT: ${AI_OPENAI_ENDPOINT:-https://api.openai.com/v1}
      AI_TASK_ACTIVITY_EXTRACTION_PROVIDER: ${AI_TASK_ACTIVITY_EXTRACTION_PROVIDER:-OPENAI}
      AI_TASK_ACTIVITY_EXTRACTION_MODEL: ${AI_TASK_ACTIVITY_EXTRACTION_MODEL:-gpt-4.1-nano}
      AI_TASK_READINESS_EXTRACTION_PROVIDER: ${AI_TASK_READINESS_EXTRACTION_PROVIDER:-OPENAI}
      AI_TASK_READINESS_EXTRACTION_MODEL: ${AI_TASK_READINESS_EXTRACTION_MODEL:-gpt-4.1-nano}
      AI_TASK_VOICE_TRANSCRIPTION_PROVIDER: ${AI_TASK_VOICE_TRANSCRIPTION_PROVIDER:-OPENAI}
      AI_TASK_VOICE_TRANSCRIPTION_MODEL: ${AI_TASK_VOICE_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-15}
      AI_RETRIES: ${AI_RETRIES:-1}
      AI_MAX_TEXT_CHARS: ${AI_MAX_TEXT_CHARS:-4000}
      AI_MAX_IMAGE_BYTES: ${AI_MAX_IMAGE_BYTES:-5242880}
      AI_MAX_IMAGE_PIXELS: ${AI_MAX_IMAGE_PIXELS:-20000000}
      AI_MAX_AUDIO_BYTES: ${AI_MAX_AUDIO_BYTES:-10485760}
      AI_DAILY_USER_LIMIT: ${AI_DAILY_USER_LIMIT:-5}
      AI_MONTHLY_GLOBAL_LIMIT: ${AI_MONTHLY_GLOBAL_LIMIT:-100}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - activity_storage:/data/idaten
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  postgres_data:
  activity_storage:
