services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idaten}
      POSTGRES_USER: ${POSTGRES_USER:-idaten}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://idaten:change-me@postgres:5432/idaten}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Moscow}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STORAGE_PATH: ${STORAGE_PATH:-/data/idaten}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      MAX_ARCHIVE_UNCOMPRESSED_BYTES: ${MAX_ARCHIVE_UNCOMPRESSED_BYTES:-52428800}
      MAX_ARCHIVE_ENTRIES: ${MAX_ARCHIVE_ENTRIES:-10}
      MAX_ARCHIVE_RATIO: ${MAX_ARCHIVE_RATIO:-100}
      IMPORT_API_TOKEN: ${IMPORT_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - activity_storage:/data/idaten
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

volumes:
  postgres_data:
  activity_storage:
